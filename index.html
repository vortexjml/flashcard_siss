<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="app-header">
        <h1 class="app-title">Flashcards</h1>
        <button id="theme-toggle" class="icon-button" aria-label="н…Ңл§Ҳ м „нҷҳ">рҹҢҷ</button>
    </header>

    <main class="app-main">
        <section id="view-home">

            <div class="view-header">
                <h2>лӮҙ лҚұ</h2>
            </div>
            <div id="deck-list" class="deck-list"></div>
            <button id="btn-new-deck" class="fab" aria-label="мғҲ лҚұ л§Ңл“Өкё°">+</button>
        </section>

        <section id="view-deck" hidden>
            <div class="view-header">
                <button id="btn-back-to-home" class="icon-button" aria-label="л’ӨлЎң">вҶҗ</button>
                <h2 id="deck-detail-name"></h2>
            </div>
            <p id="deck-detail-info" class="text-muted"></p>

            <div id="card-list" class="card-list"></div>

            <button id="btn-add-card" class="fab" aria-label="м№ҙл“ң м¶”к°Җ">+</button>
            <button id="btn-start-study" class="btn btn-primary btn-large">н•ҷмҠө мӢңмһ‘</button>
        </section>

        <section id="view-card-edit" hidden>
            <div class="view-header">
                <button id="btn-cancel-edit" class="icon-button" aria-label="м·ЁмҶҢ">вҶҗ</button>
                <h2 id="card-edit-title">м№ҙл“ң м¶”к°Җ</h2>
            </div>

            <form id="card-edit-form" class="card-form">
                <label class="form-field">
                    <span class="form-label">м•һл©ҙ (м§Ҳл¬ё)</span>
                    <textarea id="input-front" class="form-textarea" rows="3" required></textarea>
                </label>

                <label class="form-field">
                    <span class="form-label">л’·л©ҙ (лӢө)</span>
                    <textarea id="input-back" class="form-textarea" rows="3" required></textarea>
                </label>

                <div class="form-actions">
                    <button type="button" id="btn-delete-card" class="btn btn-danger" hidden>
                        мӮӯм ң
                    </button>
                    <button type="submit" class="btn btn-primary">м ҖмһҘ</button>
                </div>
            </form>
        </section>

        <section id="view-study" hidden>
            <div class="study-header">
                <button id="btn-end-study" class="icon-button" aria-label="н•ҷмҠө мў…лЈҢ">вң•</button>
                <div class="study-progress">
                    <span id="study-counter">0 / 0</span>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
            </div>

            <div id="study-card" class="study-card">
                <div class="study-card__inner">
                    <div class="study-card__face study-card__front">
                        <p id="study-front"></p>
                    </div>
                    <div class="study-card__face study-card__back">
                        <p id="study-back"></p>
                    </div>
                </div>
            </div>

            <div class="study-actions">
                <button id="btn-flip" class="btn btn-primary">лӢө ліҙкё°</button>
                <div id="study-answer-buttons" class="study-answer-buttons" hidden>
                    <button id="btn-incorrect" class="btn btn-danger">лӘЁлҘҙкІ м–ҙмҡ”</button>
                    <button id="btn-correct" class="btn btn-primary">м•Ңм•„мҡ”</button>
                </div>
            </div>
            <p class="study-hint text-muted">
                SpaceлЎң л’Өм§‘кё° В· 1: лӘЁлҘҙкІ м–ҙмҡ” В· 2: м•Ңм•„мҡ” В· ESC: мў…лЈҢ
            </p>
        </section>

        <section id="view-result" hidden>
            <div class="result-content">
                <h2 class="result-headline">мҲҳкі н–Ҳм–ҙмҡ”! рҹҺү</h2>
                <div class="result-score">
                    <span id="result-correct">0</span>
                    <span class="result-divider">/</span>
                    <span id="result-total">0</span>
                </div>
                <p id="result-percentage" class="text-muted"></p>

                <div class="result-actions">
                    <button id="btn-restart-study" class="btn">мІҳмқҢл¶Җн„° лӢӨмӢң</button>
                    <button id="btn-back-from-result" class="btn btn-primary">лҚұмңјлЎң лҸҢм•„к°Җкё°</button>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
